# Server Configuration
server.port=8083
spring.application.name=tool-service

# Database Configuration (PostgreSQL on port 5434)
spring.datasource.url=jdbc:postgresql://localhost:5434/tool_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# User Service URL (for Feign Client)
user.service.url=http://localhost:8082

# Logging
logging.level.com.toolsharing.tool_service=DEBUG
logging.level.com.toolsharing.tool_service.controller=DEBUG

#eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true