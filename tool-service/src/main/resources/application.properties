# ===============================
# Server Configuration
# ===============================
server.port=8083
spring.application.name=tool-service

# ===============================
# Database Configuration
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5434/tool_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA & Hibernate Configuration (Spring Boot 3.x)
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# In Spring Boot 3 (Hibernate 6), database-platform replaces the old dialect property.
# PostgreSQLDialect automatically detects and uses PostGIS features if hibernate-spatial is in your pom.xml.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# Microservice & Discovery (Eureka / Feign)
# ===============================

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ===============================
# Logging
# ===============================
logging.level.com.toolsharing.tool_service=DEBUG
logging.level.com.toolsharing.tool_service.controller=DEBUG

# ===============================
# Redis Connection Configuration
# ===============================
# CRITICAL: Pointing to your Docker container name, NOT localhost!
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2s

# Lettuce Connection Pool (Great for production stability)
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# ===============================
# Spring Cache Configuration
# ===============================
# This turns the cache ON so your @Cacheable annotations actually work
spring.cache.type=redis