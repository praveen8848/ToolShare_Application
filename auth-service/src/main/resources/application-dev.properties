# Development Profile
spring.profiles.active=dev

# Development Database (if using different DB for dev)
spring.datasource.url=jdbc:postgresql://localhost:5432/auth_dev_db
spring.datasource.username=postgres
spring.datasource.password=postgres

# Enable more detailed logging for dev
logging.level.com.toolsharing.auth=TRACE
logging.level.org.springframework.web=DEBUG

# Dev JWT (shorter expiration for testing)
jwt.expiration=3600000