# Server Configuration
server.port=8080
spring.application.name=gateway

# JWT Configuration (must match Auth Service)
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# Redis Configuration for Rate Limiting
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2s
spring.data.redis.connect-timeout=2s

# Rate Limiter Configuration
spring.cloud.gateway.filter.request-rate-limiter.redis-rate-limiter.replenish-rate=10
spring.cloud.gateway.filter.request-rate-limiter.redis-rate-limiter.burst-capacity=20

# Enable Gateway Metrics
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers,circuitbreakerevents,gateway
management.endpoint.health.show-details=always
management.endpoint.gateway.access=read_only


# Logging
logging.level.com.toolsharing.gateway=DEBUG
logging.level.org.springframework.cloud.gateway=INFO

# Circuit Breaker Configuration (Resilience4j)

resilience4j.circuitbreaker.instances.auth-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.auth-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.auth-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.auth-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.auth-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.auth-service.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.user-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.user-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.user-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.user-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.user-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.user-service.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.tool-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.tool-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.tool-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.tool-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.tool-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.tool-service.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.booking-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.booking-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.booking-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.booking-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.booking-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.booking-service.automatic-transition-from-open-to-half-open-enabled=true

#eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

eureka.instance.prefer-ip-address=true

# Enable discovery for Gateway
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true