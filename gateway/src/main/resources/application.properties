
# =========================
# SERVER CONFIGURATION
# =========================
server.port=8080
spring.application.name=gateway

# =========================
# JWT CONFIGURATION
# =========================
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

# =========================
# REDIS CONFIGURATION (Rate Limiting)
# =========================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=5s
spring.data.redis.connect-timeout=5s

# =========================
# GATEWAY HTTP TIMEOUTS
# =========================
spring.cloud.gateway.httpclient.connect-timeout=5000
spring.cloud.gateway.httpclient.response-timeout=10s

# =========================
# RATE LIMITER CONFIGURATION
# =========================
spring.cloud.gateway.filter.request-rate-limiter.redis-rate-limiter.replenish-rate=10
spring.cloud.gateway.filter.request-rate-limiter.redis-rate-limiter.burst-capacity=20

# =========================
# ACTUATOR / METRICS
# =========================
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers,circuitbreakerevents,gateway
management.endpoint.health.show-details=always
management.endpoint.gateway.access=read_only

# =========================
# LOGGING
# =========================
logging.level.com.toolsharing.gateway=DEBUG
logging.level.org.springframework.cloud.gateway=INFO

# =========================
# EUREKA CONFIGURATION
# =========================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# =========================
# SERVICE DISCOVERY
# =========================
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# =========================
# CORS
# =========================
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=false

# =========================
# CIRCUIT BREAKER - AUTH SERVICE
# =========================
resilience4j.circuitbreaker.instances.auth-service.sliding-window-size=20
resilience4j.circuitbreaker.instances.auth-service.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.auth-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.auth-service.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.auth-service.permitted-number-of-calls-in-half-open-state=5
resilience4j.circuitbreaker.instances.auth-service.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.auth-service.slow-call-rate-threshold=60
resilience4j.circuitbreaker.instances.auth-service.slow-call-duration-threshold=3s

resilience4j.timelimiter.instances.auth-service.timeout-duration=5s
resilience4j.timelimiter.instances.auth-service.cancel-running-future=true

