# Server Configuration
server.port=8084
spring.application.name=booking-service

# Database Configuration (PostgreSQL on port 5435)
spring.datasource.url=jdbc:postgresql://localhost:5435/booking_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# External Service URLs
tool.service.url=http://localhost:8083
user.service.url=http://localhost:8082

# QR Code Configuration
qr.code.directory=./qr-codes
qr.code.width=300
qr.code.height=300

# Logging
logging.level.com.toolsharing.booking_service=DEBUG
logging.level.com.toolsharing.booking_service.client=DEBUG

#eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2s
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
#
