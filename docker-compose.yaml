version: '3.8'

services:
  # ==========================================
  # DATABASES
  # ==========================================
  postgres-auth:
    image: postgres:16
    container_name: toolsharing-auth-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data

  postgres-user:
    image: postgres:16
    container_name: toolsharing-user-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_db
    ports:
      - "5433:5432"
    volumes:
      - user_postgres_data:/var/lib/postgresql/data

  postgres-tool:
    # Changed from postgres:16
    image: postgis/postgis:16-3.4
    container_name: toolsharing-tool-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tool_db
    ports:
      - "5434:5432"
    volumes:
      # Your data is safe here
      - tool_postgres_data:/var/lib/postgresql/data

  postgres-booking:
    image: postgres:16
    container_name: toolsharing-booking-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: booking_db
    ports:
      - "5435:5432"
    volumes:
      - booking_postgres_data:/var/lib/postgresql/data

  # ==========================================
  # CACHING & RATE LIMITING
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: toolsharing-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # MESSAGE BROKER (NEW)
  # ==========================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: toolsharing-rabbitmq
    ports:
      - "5672:5672"   # Standard AMQP port (Your Spring Boot apps connect here)
      - "15672:15672" # Management UI port (You view the dashboard here)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  auth_postgres_data:
  user_postgres_data:
  tool_postgres_data:
  booking_postgres_data:
  redis_data:
  rabbitmq_data: # Added for RabbitMQ persistence