# Server Configuration
server.port=8082
spring.application.name=user-service

# Database Configuration (matches your docker-compose)
# Note: port 5433 for user database
spring.datasource.url=jdbc:postgresql://localhost:5433/user_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Secret (kept for reference, but NOT used for validation)
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

# File Upload Configuration
file.upload.dir=./uploads/profiles
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Auth Service URL
#auth.service.url=http://localhost:8081

# Logging
logging.level.com.toolsharing.user_service=DEBUG
logging.level.com.toolsharing.user_service.controller=DEBUG

#eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest